version: "3.9"

services:
  app:
    image: ghcr.io/kamaralam1984/kvltech:latest
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: kvluser
      POSTGRES_PASSWORD: kvltech2024
      POSTGRES_DB: kvltech
    volumes:
      - kvl_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kvluser"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kvl_db_data:
