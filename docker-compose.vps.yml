services:
  app:
    image: ghcr.io/kamaralam1984/kvltech:latest
    restart: always
    ports:
      - "127.0.0.1:3002:3000"
    env_file:
      - .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
