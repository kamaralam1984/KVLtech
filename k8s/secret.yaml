apiVersion: v1
kind: Secret
metadata:
  name: kvltech-secrets
  namespace: kvltech-prod
  labels:
    app: kvltech
type: Opaque
# IMPORTANT: All values below must be base64-encoded before applying.
# Generate with: echo -n 'your-value' | base64
# Replace every REPLACE_WITH_BASE64_ENCODED_VALUE placeholder before deploying.
data:
  DATABASE_URL: REPLACE_WITH_BASE64_ENCODED_VALUE
  REDIS_URL: REPLACE_WITH_BASE64_ENCODED_VALUE
  JWT_SECRET: REPLACE_WITH_BASE64_ENCODED_VALUE
  ADMIN_JWT_SECRET: REPLACE_WITH_BASE64_ENCODED_VALUE
  AGENCY_JWT_SECRET: REPLACE_WITH_BASE64_ENCODED_VALUE
  GROQ_API_KEY: REPLACE_WITH_BASE64_ENCODED_VALUE
  RAZORPAY_KEY_ID: REPLACE_WITH_BASE64_ENCODED_VALUE
  RAZORPAY_KEY_SECRET: REPLACE_WITH_BASE64_ENCODED_VALUE
  STRIPE_SECRET_KEY: REPLACE_WITH_BASE64_ENCODED_VALUE
  STRIPE_WEBHOOK_SECRET: REPLACE_WITH_BASE64_ENCODED_VALUE
  RESEND_API_KEY: REPLACE_WITH_BASE64_ENCODED_VALUE
  EMAIL_FROM: REPLACE_WITH_BASE64_ENCODED_VALUE
  REDIS_PASSWORD: REPLACE_WITH_BASE64_ENCODED_VALUE
  POSTGRES_PASSWORD: REPLACE_WITH_BASE64_ENCODED_VALUE
  POSTGRES_USER: REPLACE_WITH_BASE64_ENCODED_VALUE
  POSTGRES_DB: REPLACE_WITH_BASE64_ENCODED_VALUE
