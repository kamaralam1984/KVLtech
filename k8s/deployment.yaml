apiVersion: apps/v1
kind: Deployment
metadata:
  name: kvltech-app
  namespace: kvltech-prod
  labels:
    app: kvltech
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kvltech
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kvltech
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: kvltech-app
          image: ghcr.io/kvltech/kvl-tech-website:latest
          ports:
            - containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: kvltech-config
            - secretRef:
                name: kvltech-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
      restartPolicy: Always
