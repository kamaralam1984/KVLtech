server {
    listen 80;
    server_name kvlbusinesssolutions.com www.kvlbusinesssolutions.com;
    return 301 https://kvlbusinesssolutions.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kvlbusinesssolutions.com www.kvlbusinesssolutions.com;

    ssl_certificate /etc/letsencrypt/live/kvlbusinesssolutions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kvlbusinesssolutions.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3002;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
