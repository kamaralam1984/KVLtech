upstream kvlapp {
    server 127.0.0.1:3006;
    keepalive 32;
}

server {
    listen 80;
    server_name kvlbusinesssolutions.com www.kvlbusinesssolutions.com;
    return 301 https://kvlbusinesssolutions.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kvlbusinesssolutions.com www.kvlbusinesssolutions.com;

    ssl_certificate /etc/letsencrypt/live/kvlbusinesssolutions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kvlbusinesssolutions.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Static assets — serve with long cache
    location /_next/static/ {
        proxy_pass http://kvlapp;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket endpoint
    location /ws {
        proxy_pass http://kvlapp;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # Main app
    location / {
        proxy_pass http://kvlapp;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;

        # Auto-retry on error/timeout (not on POST)
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }
}
