name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC — triggers backup job

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-typecheck:
    name: Lint & TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --frozen-lockfile
      - run: npx prisma generate
        env:
          SKIP_ENV_VALIDATION: "1"
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: ESLint
        run: npm run lint --if-present

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --frozen-lockfile
      - run: npx prisma generate
        env:
          SKIP_ENV_VALIDATION: "1"
      - name: Build Next.js
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          SKIP_ENV_VALIDATION: "1"
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        if: ${{ secrets.DEPLOY_HOST != '' }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/kvl-tech
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u kamaralam1984 --password-stdin
            curl -fsSL https://raw.githubusercontent.com/kamaralam1984/KVLtech/main/docker-compose.vps.yml -o docker-compose.vps.yml
            curl -fsSL https://raw.githubusercontent.com/kamaralam1984/KVLtech/main/nginx-kvltech.conf -o /etc/nginx/sites-available/kvlbusinesssolutions.com
            ln -sf /etc/nginx/sites-available/kvlbusinesssolutions.com /etc/nginx/sites-enabled/kvlbusinesssolutions.com
            nginx -t && nginx -s reload
            docker compose -f docker-compose.vps.yml pull
            docker compose -f docker-compose.vps.yml up -d --remove-orphans
            sleep 20
            docker compose -f docker-compose.vps.yml exec -T app npx prisma db push --skip-generate || true
            docker image prune -f
            echo "Deployed at $(date)"
      - name: Health check
        if: ${{ secrets.DEPLOY_HOST != '' }}
        run: |
          sleep 45
          curl -f https://kvlbusinesssolutions.com/api/health || exit 1
          echo "Health check passed"

  backup:
    name: Daily Database Backup
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Run backup on production server
        uses: appleboy/ssh-action@v1.0.3
        if: ${{ secrets.DEPLOY_HOST != '' }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            /opt/kvltech/scripts/backup.sh
            echo "Backup completed at $(date)"
